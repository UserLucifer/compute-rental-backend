server:
  port: 8080

logging:
  level:
    root: INFO
    com.compute.rental: INFO
    com.baomidou.mybatisplus: INFO

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: compute-rental-backend
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/compute_rental?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: ComputeRentalHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 20
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.compute.rental.modules
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  time-zone: Asia/Shanghai
  production:
    enforce: ${APP_PRODUCTION_ENFORCE:false}
    allow-local-infrastructure: ${APP_PRODUCTION_ALLOW_LOCAL_INFRASTRUCTURE:false}
    allow-empty-redis-password: ${APP_PRODUCTION_ALLOW_EMPTY_REDIS_PASSWORD:false}
    allow-rabbit-guest-user: ${APP_PRODUCTION_ALLOW_RABBIT_GUEST_USER:false}
    allow-wildcard-websocket-origins: ${APP_PRODUCTION_ALLOW_WILDCARD_WEBSOCKET_ORIGINS:false}
    allow-api-docs: ${APP_PRODUCTION_ALLOW_API_DOCS:false}
  jwt:
    issuer: compute-rental
    secret: ${JWT_SECRET:}
    access-token-ttl: 24h
  api-token:
    encryption-secret: ${API_TOKEN_ENCRYPTION_SECRET:}
    base-url: ${API_TOKEN_BASE_URL:https://api.example.invalid/v1}
  auth:
    email-code-ttl: 5m
    email-code-length: 6
    email-code-rate-limit-per-minute: 5
    email-from: ${MAIL_FROM:no-reply@example.invalid}
    email-subject: Compute Rental login verification code
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000}
  order:
    # 本地默认和生产一致：部署费支付后 24 小时自动暂停。
#    auto-pause-delay: ${APP_ORDER_AUTO_PAUSE_DELAY:24h}
    # 本地测试自动暂停时，注释上面的 24h，打开下面的 5m；测完恢复 24h。
     auto-pause-delay: ${APP_ORDER_AUTO_PAUSE_DELAY:5m}
  scheduler:
    # 本地默认和生产一致。
#    daily-profit-cron: "${APP_SCHEDULER_DAILY_PROFIT_CRON:0 0 0 * * *}"
#    order-expire-settle-cron: "${APP_SCHEDULER_ORDER_EXPIRE_SETTLE_CRON:0 * * * * *}"
#    auto-pause-cron: "${APP_SCHEDULER_AUTO_PAUSE_CRON:0 */5 * * * *}"
#    deploy-fee-timeout-cancel-cron: "${APP_SCHEDULER_DEPLOY_FEE_TIMEOUT_CANCEL_CRON:0 */10 * * * *}"
#    commission-generate-cron: "${APP_SCHEDULER_COMMISSION_GENERATE_CRON:0 */5 * * * *}"

     #本地测试加速配置：需要时注释上面同名配置，再打开下面同名配置；测完恢复上面的生产标准。
     daily-profit-cron: "${APP_SCHEDULER_DAILY_PROFIT_CRON:0 */10 * * * *}"
     order-expire-settle-cron: "${APP_SCHEDULER_ORDER_EXPIRE_SETTLE_CRON:0 * * * * *}"
     auto-pause-cron: "${APP_SCHEDULER_AUTO_PAUSE_CRON:0 * * * * *}"
     deploy-fee-timeout-cancel-cron: "${APP_SCHEDULER_DEPLOY_FEE_TIMEOUT_CANCEL_CRON:0 */10 * * * *}"
     commission-generate-cron: "${APP_SCHEDULER_COMMISSION_GENERATE_CRON:0 * * * * *}"
